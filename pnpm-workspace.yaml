packages:
  - 'apps/*'
  - 'packages/*'

# Hoisting de pacotes que scripts rodando de CWDs de workspace (ex: eslint
# carregado em apps/*/package.json) precisam enxergar como se fossem globais.
# Sem isso, pnpm 11 strict (isolated) esconde deps do root e o `eslint.config.mjs`
# quebra com "Cannot find package '@eslint/js'".
publicHoistPattern:
  - '@eslint/js'
  - 'eslint-config-prettier'
  - 'eslint-plugin-prettier'
  - '@typescript-eslint/*'
  - 'globals'

allowBuilds:
  '@nestjs/core': true
  '@sentry/cli': true
  '@swc/core': true
  argon2: true
  esbuild: true
  protobufjs: true
  sharp: true

# pnpm overrides (movido do package.json, ignorado desde pnpm 9+)
overrides:
  '@humanwhocodes/config-array': npm:@eslint/config-array@^0.23.5
  '@humanwhocodes/object-schema': npm:@eslint/object-schema@^3.0.5
  otplib: ^13.4.1

minimumReleaseAgeExclude:
  - '@sentry/browser-utils@10.60.0'
  - '@sentry/browser@10.60.0'
  - '@sentry/core@10.60.0'
  - '@sentry/feedback@10.60.0'
  - '@sentry/nestjs@10.60.0'
  - '@sentry/nextjs@10.60.0'
  - '@sentry/node-core@10.60.0'
  - '@sentry/node@10.60.0'
  - '@sentry/opentelemetry@10.60.0'
  - '@sentry/react@10.60.0'
  - '@sentry/replay-canvas@10.60.0'
  - '@sentry/replay@10.60.0'
  - '@sentry/server-utils@10.60.0'
  - '@sentry/vercel-edge@10.60.0'
