name: CI

on:
  push:
    branches: [main, 'sprint/*']
  pull_request:
    branches: [main]

# Cancela runs anteriores na mesma branch para economizar minutos.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: apenas leitura do repo. Sem write/deploy (Sprint 1 nao faz deploy).
permissions:
  contents: read

jobs:
  ci:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: controle_credito_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d controle_credito_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Conexoes nos services. O job roda no runner (nao em container),
      # entao acessamos via localhost:5432 (port mapping do service).
      # O hostname 'postgres' do service DNS eh' flaky - ja' causou
      # 'Temporary failure in name resolution' no run #28067640965.
      DATABASE_URL: postgres://app:app@localhost:5432/controle_credito_test
      DATABASE_URL_TEST: postgres://app:app@localhost:5432/controle_credito_test
      DATABASE_URL_SYSTEM: postgres://app:app@localhost:5432/controle_credito_test
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: test-secret-test-secret-test-secret-test-secret-aaaa
      NEXTAUTH_URL: http://localhost:3000
      JWT_SECRET: test-jwt-secret-test-jwt-secret-test-jwt-secret-bbbb
      NODE_ENV: test
      LOG_LEVEL: error

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        # Versao de pnpm vem do campo `packageManager` do package.json
        # (pnpm@11.9.0). NAO setar `version:` aqui - causa conflito
        # ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build packages (infra, contracts, domain)
        # Os packages sao consumidos via src/ no dev, mas em prod/build
        # o Node ESM precisa de .js no filesystem. Buildamos antes de
        # rodar typecheck/lint/test que dependem do dist/.
        run: |
          pnpm --filter @controle-credito/contracts build
          pnpm --filter @controle-credito/domain build
          pnpm --filter @controle-credito/infra build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        # Suite e2e NAO roda em CI nesta task - requer GRANTs manuais em
        # app_system (que seria o proximo passo). Unit tests dao cobertura
        # suficiente para o CI baseline.
        run: pnpm test

      - name: Install postgresql-client (psql + pg_isready)
        # ubuntu-latest vem SEM postgresql-client. Precisamos pra rodar
        # psql nos steps de Setup/Verify RLS. ~10s de install.
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Setup test DB (migrations + role + grants)
        # Prepara o test DB: cria app_system com BYPASSRLS e da os GRANTs
        # necessarios. Host: localhost (port mapping do service).
        env:
          PGPASSWORD: app
        run: |
          # Espera Postgres aceitar queries reais. Usa 'psql -c SELECT 1'
          # porque eh' mais robusto que pg_isready (testa o caminho
          # completo TCP + auth + query, nao so' socket).
          for i in $(seq 1 30); do
            if psql -h localhost -p 5432 -U app -d controle_credito_test -c "SELECT 1" -q -tA >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! psql -h localhost -p 5432 -U app -d controle_credito_test -c "SELECT 1" -q -tA >/dev/null 2>&1; then
            echo "::error::Postgres nao ficou pronto em 30s"
            exit 1
          fi

          # Criar role app_system com BYPASSRLS (nao tem no init.sql padrao).
          psql -h localhost -U app -d controle_credito_test -c "CREATE USER app_system WITH PASSWORD 'app_system' BYPASSRLS NOSUPERUSER;"
          # Grants minimos para o systemPool (signup + seed da e2e).
          psql -h localhost -U app -d controle_credito_test -c "GRANT CONNECT ON DATABASE controle_credito_test TO app_system;"
          psql -h localhost -U app -d controle_credito_test -c "GRANT USAGE ON SCHEMA public TO app_system;"
          psql -h localhost -U app -d controle_credito_test -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_system;"
          psql -h localhost -U app -d controle_credito_test -c "GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_system;"

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Verify RLS is active
        # Smoke check: confirmar que o role app NAO eh superuser (BYPASSRLS
        # so funciona com FORCE row level security; sem isso, RLS eh
        # nominal, nao real). Este step nao falha o CI - eh so um aviso
        # para detectar drift na configuracao do role.
        env:
          PGPASSWORD: app
        run: |
          SUPER=$(psql -h localhost -U app -d controle_credito_test -tA -c "SELECT rolsuper FROM pg_roles WHERE rolname='app'")
          if [ "$SUPER" = "t" ]; then
            echo "::warning::Role 'app' is SUPERUSER - RLS is being bypassed. See rls-hardening-app_system memory."
          fi
