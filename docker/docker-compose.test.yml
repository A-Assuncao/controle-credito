services:
  postgres:
    image: postgres:18-alpine
    container_name: cc_postgres_test
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: controle_credito_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d controle_credito_test']
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cc_redis_test
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 10
